apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: ouijjanemohamed/webapp:latest ## J’ai utilisé l’image que j’ai créée et poussée sur Docker Hub
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
